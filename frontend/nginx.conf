server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large log-file uploads through the proxy.
    client_max_body_size 512m;

    # Reverse-proxy API calls to the backend container (service name "backend"
    # on the compose network). Mirrors the Vite dev-server /api proxy.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pipeline processing can take a while; keep connections open.
        proxy_connect_timeout 75s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # Single-page-app routing: serve index.html for any unknown path so the
    # React Router client can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
